name: Deploy WordPress Assets

on:
  push:
    branches: ["main"]
    paths:
      - "local-theme/**"
      - "mu-plugins/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_WP_CONTENT: ${{ secrets.DEPLOY_WP_CONTENT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_PORT"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_WP_CONTENT"
          test -n "${{ secrets.DEPLOY_SSH_KEY }}"

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Ensure target directories
        run: |
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "mkdir -p '$DEPLOY_WP_CONTENT/themes/local-theme' '$DEPLOY_WP_CONTENT/mu-plugins'"

      - name: Deploy theme
        run: |
          rsync -az --delete \
            -e "ssh -p $DEPLOY_PORT" \
            ./local-theme/ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_WP_CONTENT/themes/local-theme/"

      - name: Deploy mu-plugins
        run: |
          rsync -az --delete \
            -e "ssh -p $DEPLOY_PORT" \
            ./mu-plugins/ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_WP_CONTENT/mu-plugins/"

      - name: Done
        run: echo "Deploy finished successfully"
